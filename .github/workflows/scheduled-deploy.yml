name: Scheduled Deploy to Vercel

on:
  workflow_dispatch: # Manual trigger only — schedule paused until board re-enables

jobs:
  deploy:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Production
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_YeVRerYJqwGluuRO5ir4hbSb
          VERCEL_PROJECT_ID: prj_sG7vyFgFuluONMvToSGaclqs1HNd
