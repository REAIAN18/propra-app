<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealHQ — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090b;--s1:#111116;--s2:#18181f;--s3:#1f1f28;--bdr:#252533;--bdr-lt:#1a1a26;
  --tx:#e4e4ec;--tx2:#8888a0;--tx3:#555568;
  --acc:#7c6af0;--acc-dim:rgba(124,106,240,.06);--acc-lt:rgba(124,106,240,.10);--acc-bdr:rgba(124,106,240,.22);
  --red:#f87171;--red-lt:rgba(248,113,113,.07);--red-bdr:rgba(248,113,113,.22);
  --serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}a{text-decoration:none;color:inherit}
html{scroll-behavior:smooth;background-color:#09090b}
body{background:#09090b;background-color:#09090b;color:var(--tx);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

@keyframes enter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:enter .5s ease both}.a2{animation:enter .5s ease both .08s}.a3{animation:enter .5s ease both .16s}.a4{animation:enter .5s ease both .24s}.a5{animation:enter .5s ease both .32s}

.nav{height:52px;background-color:#09090b;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;padding:0 32px;flex-shrink:0}
.nav-mark{font-family:var(--serif);font-size:19px;color:var(--tx)}.nav-mark span{color:var(--acc);font-style:italic}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;background-color:#09090b}
.form-wrap{width:100%;max-width:400px}

.form-h{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--tx);text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.form-sub{font:300 14px/1.5 var(--sans);color:var(--tx3);text-align:center;margin-bottom:32px}

.oauth-btn{width:100%;height:46px;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--s1);border:1px solid var(--bdr);border-radius:10px;font:500 13px var(--sans);color:var(--tx);cursor:pointer;transition:all .15s;margin-bottom:8px}
.oauth-btn:hover{border-color:var(--tx3);background:var(--s2)}
.oauth-icon{width:18px;height:18px;border-radius:4px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px}

.divider{display:flex;align-items:center;gap:14px;margin:24px 0}
.divider-line{flex:1;height:1px;background:var(--bdr)}
.divider-text{font:400 11px var(--sans);color:var(--tx3)}

.field{margin-bottom:14px}
.field-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.field-label{font:500 11px var(--sans);color:var(--tx2)}
.field-link{font:400 11px var(--sans);color:var(--acc);cursor:pointer;transition:opacity .15s}.field-link:hover{opacity:.8}
.field-input{width:100%;padding:12px 16px;background:var(--s1);border:1.5px solid var(--bdr);border-radius:9px;font:400 14px var(--sans);color:var(--tx);outline:none;transition:border-color .2s,box-shadow .2s}
.field-input::placeholder{color:var(--tx3)}
.field-input:focus{border-color:var(--acc-bdr);box-shadow:0 0 0 3px var(--acc-dim)}

/* Error state (hidden by default) */
.field-error{display:none;font:400 11px var(--sans);color:var(--red);margin-top:6px;padding:6px 10px;background:var(--red-lt);border:1px solid var(--red-bdr);border-radius:6px}
.field-error.show{display:block}

.submit-btn{width:100%;height:46px;background:var(--acc);color:#fff;border:none;border-radius:10px;font:600 14px/1 var(--sans);cursor:pointer;transition:all .15s;margin-top:20px}
.submit-btn:hover{background:#6d5ce0;transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,106,240,.25)}

.form-footer{text-align:center;margin-top:20px;font:400 12px var(--sans);color:var(--tx3)}
.form-footer a{color:var(--acc);font-weight:500;transition:opacity .15s}.form-footer a:hover{opacity:.8}

@media(max-width:480px){.page{padding:24px 20px}}
</style>
</head>
<body>

<nav class="nav">
  <a href="/"><div class="nav-mark"><span>R</span>ealHQ</div></a>
</nav>

<div class="page">
<div class="form-wrap">

  <h1 class="form-h a1">Welcome back</h1>
  <p class="form-sub a2">Sign in to your portfolio.</p>

  <!-- OAuth -->
  <button class="oauth-btn a3">
    <div class="oauth-icon">G</div>
    Continue with Google
  </button>
  <button class="oauth-btn a3">
    <div class="oauth-icon">M</div>
    Continue with Microsoft
  </button>

  <div class="divider a4">
    <div class="divider-line"></div>
    <div class="divider-text">or sign in with email</div>
    <div class="divider-line"></div>
  </div>

  <!-- Form -->
  <div class="a4">
    <div class="field">
      <label class="field-label">Email</label>
      <input class="field-input" type="email" placeholder="ian@example.com" />
    </div>
    <div class="field">
      <div class="field-top">
        <label class="field-label">Password</label>
        <a class="field-link" href="/forgot-password">Forgot password?</a>
      </div>
      <input class="field-input" type="password" placeholder="Your password" />
      <div class="field-error" id="error">Invalid email or password. Please try again.</div>
    </div>
  </div>

  <button class="submit-btn a5">Sign in →</button>

  <div class="form-footer a5">
    Don't have an account? <a href="/signup">Start free →</a>
  </div>

</div>
</div>

</body>
</html>
