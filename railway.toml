[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c 'echo \"[start] PORT=${PORT:-3000}\"; timeout 30 npx prisma db push --accept-data-loss || true; npx next start -p ${PORT:-3000}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 60
