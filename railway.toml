[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c 'echo \"[start] PORT=${PORT:-3000}\"; timeout 30 npx prisma db push --accept-data-loss || true; HOSTNAME=0.0.0.0 PORT=${PORT:-3000} node .next/standalone/server.js'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/"
healthcheckTimeout = 60
